  <style>
    :root {
      --transition-speed: 0.2s;
    }

    :root[data-theme="dark"] {
      --bg: #0b0f19;
      --card-bg: #111827;
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover-border: rgba(99, 102, 241, 0.4);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --th-bg: #1f2937;
      --table-border: rgba(255, 255, 255, 0.06);
      --tr-hover: rgba(255, 255, 255, 0.02);
      --btn-bg: #1f2937;
      --btn-active-bg: #6366f1;
      --btn-active-text: #ffffff;
      --input-border: rgba(255, 255, 255, 0.1);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }

    :root[data-theme="light"] {
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --card-border: rgba(0, 0, 0, 0.08);
      --card-hover-border: rgba(79, 70, 229, 0.4);
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #3730a3;
      --accent-glow: rgba(79, 70, 229, 0.1);
      --th-bg: #f1f5f9;
      --table-border: rgba(0, 0, 0, 0.06);
      --tr-hover: rgba(0, 0, 0, 0.01);
      --btn-bg: #e2e8f0;
      --btn-active-bg: #4f46e5;
      --btn-active-text: #ffffff;
      --input-border: rgba(0, 0, 0, 0.15);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 3rem 1.5rem;
      min-height: 100vh;
      transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1050px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
      text-align: center;
      position: relative;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 300;
    }

    .controls-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex-grow: 1;
      min-width: 250px;
    }

    .search-input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
    }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .action-buttons {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn-group {
      display: flex;
      background: var(--btn-bg);
      padding: 0.25rem;
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .control-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s ease;
    }

    .control-btn.active {
      background: var(--btn-active-bg);
      color: var(--btn-active-text);
    }

    .control-btn:hover:not(.active) {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .theme-toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 0.5rem;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      box-shadow: var(--shadow);
      transition: all 0.2s ease;
    }

    .theme-toggle-btn:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .stats {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      font-weight: 400;
    }

    /* Card View Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow);
      content-visibility: auto;
      contain-intrinsic-size: auto 150px;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--card-hover-border);
      box-shadow: 0 10px 20px -10px var(--accent-glow);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .card:hover::before {
      transform: translateX(100%);
    }

    .card-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
      flex-grow: 1;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      border-top: 1px solid var(--table-border);
      padding-top: 1rem;
    }

    /* Table View Layout */
    .table-container {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow-x: auto;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }

    th {
      background-color: var(--th-bg);
      padding: 0.9rem 1.25rem;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--table-border);
      user-select: none;
    }

    th.sortable {
      cursor: pointer;
    }

    th.sortable:hover {
      color: var(--accent);
    }

    td {
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid var(--table-border);
      color: var(--text);
      line-height: 1.5;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr {
      transition: background-color 0.15s ease;
    }

    tr:hover td {
      background-color: var(--tr-hover);
    }

    .table-title {
      font-weight: 600;
      color: var(--text);
    }

    .table-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      max-width: 400px;
    }

    .sort-indicator {
      display: inline-block;
      margin-left: 0.25rem;
      font-size: 0.75rem;
      vertical-align: middle;
      transition: transform 0.2s ease;
    }

    /* General tags and links */
    .tag {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      letter-spacing: 0.05em;
      display: inline-block;
    }

    .tag-web { background: rgba(99, 102, 241, 0.12); color: #818cf8; }
    .tag-mobile { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
    .tag-ai { background: rgba(251, 146, 60, 0.1); color: #fb923c; }
    .tag-api { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
    .tag-data { background: rgba(167, 139, 250, 0.1); color: #a78bfa; }
    .tag-misc { background: rgba(100, 116, 139, 0.1); color: #94a3b8; }

    .links {
      display: flex;
      gap: 0.85rem;
      align-items: center;
    }

    .link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .link:hover {
      color: var(--accent);
    }

    .link-visit {
      background: var(--accent);
      color: #ffffff !important;
      padding: 0.3rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .link-visit:hover {
      background: var(--accent-hover);
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      border-top: 1px solid var(--card-border);
      padding-top: 2rem;
      opacity: 0.7;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 1rem;
      grid-column: 1 / -1;
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
    }

    .hidden {
      display: none !important;
    }
    
    .icon {
      vertical-align: middle;
    }
  </style>
</head>

      { title: "Triomix | DNA, RNA, and Protein Bioinformatics by 1Cell.Ai", tag: "web", desc: "TriomX precision-oncology marketing site with video.", github_url: "https://github.com/nandiraju/triomix", pages_url: "http://triomx.com/" },
      { title: "bharatcancer.com | India Cancer Statistics Dashboard & NCRP Analytics", tag: "web", desc: "3-D interactive Earth visualisation (Vite + WebGL).", github_url: "https://github.com/nandiraju/bharatcancer", pages_url: "http://bharatcancer.com/" },
      { title: "googlefiresearchstorebrowser", tag: "ai", desc: "Vite browser for Google Firebase / Gemini file-search stores.", github_url: "https://github.com/nandiraju/store-browser", pages_url: "https://nandiraju.github.io/store-browser/" },
      { title: "iCore Federated Biobank | LIMS & iTracker Portal", tag: "web", desc: "Biobank demo — interactive data explorer built with Vite.", github_url: "https://github.com/nandiraju/biomarketplace", pages_url: "https://nandiraju.github.io/biomarketplace/" },
      { title: "orgchart", tag: "web", desc: "Org-chart visualiser loaded from CSV data (Vite).", github_url: "https://github.com/nandiraju/org-chart", pages_url: "https://nandiraju.github.io/org-chart/" },
      { title: "prostrate-form", tag: "web", desc: "Vite-based prostate-cancer patient intake form.", github_url: "https://github.com/nandiraju/prostrate-tracker", pages_url: "https://nandiraju.github.io/prostrate-tracker/" },
    ];

    // Application state
    let searchFilter = "";
    let currentView = localStorage.getItem("wiki-view") || "card";
    let currentTheme = localStorage.getItem("wiki-theme") || "light";
    let sortBy = "title";
    let sortOrder = "asc";

    // Set initial date
    document.getElementById('genDate').textContent = new Date().toLocaleDateString('en-US', {
      year: 'numeric',
      month: 'long',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });

    // Initialize layout & theme
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateThemeIcons();

    // Initial draw
    updateUI();

    function toggleTheme() {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      document.documentElement.setAttribute('data-theme', currentTheme);
      localStorage.setItem("wiki-theme", currentTheme);
      updateThemeIcons();
    }

    function updateThemeIcons() {
      const moon = document.getElementById("moonIcon");
      const sun = document.getElementById("sunIcon");
      if (currentTheme === "dark") {
        moon.classList.remove("hidden");
        sun.classList.add("hidden");
      } else {
        moon.classList.add("hidden");
        sun.classList.remove("hidden");
      }
    }

    function changeView(view) {
      currentView = view;
      localStorage.setItem("wiki-view", view);
      updateUI();
    }

    function handleSearch(val) {
      searchFilter = val.toLowerCase().trim();
      updateUI();
    }

    function handleSort(column) {
      if (sortBy === column) {
        sortOrder = sortOrder === "asc" ? "desc" : "asc";
      } else {
        sortBy = column;
        sortOrder = "asc";
      }
      updateUI();
    }

    function getTagClass(tag) {
      return `tag-${tag.toLowerCase()}`;
    }

    function updateUI() {
      // Update view toggle button classes
      document.getElementById("viewCardBtn").classList.toggle("active", currentView === "card");
      document.getElementById("viewTableBtn").classList.toggle("active", currentView === "table");

      // Filter
      let filtered = projects.filter(p => 
        p.title.toLowerCase().includes(searchFilter) || 
        p.desc.toLowerCase().includes(searchFilter) || 
        p.tag.toLowerCase().includes(searchFilter)
      );

      // Sort
      filtered.sort((a, b) => {
        let valA = a[sortBy].toLowerCase();
        let valB = b[sortBy].toLowerCase();
        if (valA < valB) return sortOrder === "asc" ? -1 : 1;
        if (valA > valB) return sortOrder === "asc" ? 1 : -1;
        return 0;
      });

      // Show/Hide Empty State
      const emptyState = document.getElementById("emptyState");
      if (filtered.length === 0) {
        emptyState.classList.remove("hidden");
        document.getElementById("cardsGrid").classList.add("hidden");
        document.getElementById("tableWrapper").classList.add("hidden");
      } else {
        emptyState.classList.add("hidden");
        if (currentView === "card") {
          document.getElementById("cardsGrid").classList.remove("hidden");
          document.getElementById("tableWrapper").classList.add("hidden");
          renderCards(filtered);
        } else {
          document.getElementById("cardsGrid").classList.add("hidden");
          document.getElementById("tableWrapper").classList.remove("hidden");
          renderTable(filtered);
        }
      }

      // Update counters
      document.getElementById("statsCounter").textContent = 
        `Showing ${filtered.length} of ${projects.length} site${projects.length !== 1 ? 's' : ''}`;

      // Update sort indicators
      updateSortIndicators();
    }

    function updateSortIndicators() {
      const titleInd = document.getElementById("sortIndicatorTitle");
      const tagInd = document.getElementById("sortIndicatorTag");
      
      titleInd.textContent = "";
      tagInd.textContent = "";
      
      const arrow = sortOrder === "asc" ? " ▴" : " ▾";
      if (sortBy === "title") {
        titleInd.textContent = arrow;
      } else if (sortBy === "tag") {
        tagInd.textContent = arrow;
      }
    }

    function renderCards(data) {
      const grid = document.getElementById("cardsGrid");
      grid.innerHTML = "";
      data.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div>
            <div class="card-title">${p.title}</div>
            <div class="card-desc">${p.desc}</div>
          </div>
          <div class="card-meta">
            <span class="tag ${getTagClass(p.tag)}">${p.tag.toUpperCase()}</span>
            <div class="links">
              <a href="${p.github_url}" class="link" target="_blank" rel="noopener noreferrer">Code</a>
              <a href="${p.pages_url}" class="link link-visit" target="_blank" rel="noopener noreferrer">Visit</a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function renderTable(data) {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";
      data.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="table-title">${p.title}</td>
          <td><span class="tag ${getTagClass(p.tag)}">${p.tag.toUpperCase()}</span></td>
          <td class="table-desc">${p.desc}</td>
          <td>
            <div class="links">
              <a href="${p.github_url}" class="link" target="_blank" rel="noopener noreferrer">Code</a>
              <a href="${p.pages_url}" class="link link-visit" target="_blank" rel="noopener noreferrer">Visit</a>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }
  </script>
</body>
</html>
